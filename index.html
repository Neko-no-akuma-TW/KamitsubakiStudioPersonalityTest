            desc: "你的靈魂與「罪十罰」的美古途產生了叛逆的共鳴！如同從虛擬世界的深淵傳遞歌聲的使者，你的內心住著一個不羈的靈魂。你討厭虛偽的規則，遇到不公的事情會毫不猶豫地挺身而出，是用破壞與攻擊性舞曲來創造新生的反叛者。" 
        },
        yunagi: { 
            name: "夕凪機 (YUNAGI) - 罪十罰",  
            color: "var(--yunagi)", 
            desc: "你的靈魂與「罪十罰」的夕凪機產生了幽暗的共鳴！你帶有神秘、暗黑的氣質，不介意展現自己的脆弱或背負「罪惡的烙印」。你認為不完美才是最真實的美，散發著讓人難以抗拒的深淵魅力。" 
        },
        hinageshi: { 
            name: "氷夏至 (HINAGESHI) - 罪十罰",  
            color: "var(--hinageshi)", 
            desc: "你的靈魂與「罪十罰」的氷夏至產生了強悍的共鳴！你是極端護短、重情重義的存在。為了保護自己重視的事物，你願意化身為制裁者。這份帶刺的溫柔與不妥協的態度，是你最強大的武器。" 
        }
    };

    let currentQuestion = 0;
    let scores = { kaf: 0, rim: 0, haru: 0, iseye: 0, koko: 0, ciel: 0, aru: 0, asu: 0, kakyoin: 0, orihime: 0, garasumiya: 0, mikoto: 0, yunagi: 0, hinageshi: 0 };

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        document.getElementById('intro-box').style.display = 'none';
        document.getElementById('question-box').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('progress').innerText = `觀測進度 ${currentQuestion + 1} / 14`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        let shuffledOptions = shuffleArray([...q.options]);
        
        shuffledOptions.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option.text;
            btn.onclick = () => selectOption(option.member);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(member) {
        scores[member]++;
        currentQuestion++;
        
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';

        let highestScore = 0;
        let resultMember = '';
        
        for (const member in scores) {
            if (scores[member] > highestScore) {
                highestScore = scores[member];
                resultMember = member;
            }
        }

        const resultData = results[resultMember];
        
        const nameElement = document.getElementById('result-name');
        nameElement.innerText = resultData.name;
        nameElement.style.color = resultData.color;
        
        // 針對淺色系文字增加黑底陰影
        if(resultMember === 'aru' || resultMember === 'ciel' || resultMember === 'kakyoin' || resultMember === 'garasumiya') {
            nameElement.style.textShadow = "0 0 10px rgba(255,255,255,0.4), 2px 2px 5px rgba(0,0,0,0.9)";
        } else {
            nameElement.style.textShadow = `0 0 15px ${resultData.color}`;
        }
        
        document.getElementById('result-desc').style.borderColor = resultData.color;
        document.getElementById('result-desc').innerText = resultData.desc;
    }

    function restartQuiz() {
        currentQuestion = 0;
        for (let key in scores) {
            scores[key] = 0;
        }
        document.getElementById('result-box').style.display = 'none';
        document.getElementById('intro-box').style.display = 'block';
    }
</script>

</body>
</html>
